services:
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - FRONTEND_URL=http://localhost:3002
    env_file:
      - path: ./apps/backend/.env
        required: true
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - makikibahay-net

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:5000
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=production
      - PORT=3002
      - HOSTNAME=0.0.0.0
      - INTERNAL_API_URL=http://backend:5000
    env_file:
      - path: ./apps/frontend/.env
        required: false
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - makikibahay-net

networks:
  makikibahay-net:
    driver: bridge
